<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup Page</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="page-wrapper">
    <section class="signup-box">
      <h1>Sign Up</h1>

      <form action="#" method="post">
        <div class="row">
          <input type="text" name="firstName" placeholder="First Name" required>
          <input type="text" name="lastName" placeholder="Last Name" required>
        </div>

        <div class="form-group">
          <input type="tel" name="mobile" placeholder="Mobile No." required>
        </div>

        <div class="form-group">
          <input type="email" name="email" placeholder="Email Address" required>
        </div>

        <div class="row">
          <input type="password" name="password" placeholder="Password" required>
          <input type="password" name="confirmPassword" placeholder="Confirm Password" required>
        </div>

        <div class="agreement">
          <label class="agree">
            <input type="checkbox" name="agree" required>
            <span>I Agree</span>
          </label>

          <p>
            By clicking <span class="register-text">Register</span>, you agree to the
            <a href="#">Terms and Conditions</a> set out by this site, including our
            <a href="#">Cookie Use</a>.
          </p>
        </div>

        <div class="buttons">
          <button type="submit" class="register-btn">Register</button>
          <button type="button" class="signin-btn">Sign In</button>
        </div>
      </form>
    </section>
  </main>
</body>
</html>
